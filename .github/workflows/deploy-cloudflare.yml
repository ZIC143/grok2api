name: Deploy Cloudflare Workers

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ensure D1/R2 and inject bindings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DB_NAME: grok2api
          R2_NAME: grok2api-data
        run: |
          set -euo pipefail
          WRANGLER=(npx -y wrangler@latest)

          d1_list="$(${WRANGLER[@]} d1 list 2>/dev/null || true)"
          db_id=$(printf '%s' "$d1_list" | DB_NAME="$DB_NAME" python -c "$(printf '%s\n' \
            'import os, re, sys' \
            'name=os.environ.get("DB_NAME", "")' \
            'text=sys.stdin.read()' \
            'uuid=re.compile(r"[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}")' \
            'for line in text.splitlines():' \
            '    if name and name in line:' \
            '        m=uuid.search(line)' \
            '        if m:' \
            '            print(m.group(0)); sys.exit(0)' \
            '        parts=line.split()' \
            '        if parts and parts[0]==name and len(parts)>=2:' \
            '            print(parts[1]); sys.exit(0)' \
            'm=uuid.search(text)' \
            'print(m.group(0) if m else "")' \
          )")

          if [ -z "$db_id" ]; then
            d1_create="$(${WRANGLER[@]} d1 create "$DB_NAME" 2>/dev/null || true)"
            db_id=$(printf '%s' "$d1_create" | python -c "$(printf '%s\n' \
              'import re, sys' \
              'text=sys.stdin.read()' \
              'm=re.search(r"[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}", text)' \
              'print(m.group(0) if m else "")' \
            )")
          fi

          if [ -z "$db_id" ]; then
            d1_list="$(${WRANGLER[@]} d1 list 2>/dev/null || true)"
            db_id=$(printf '%s' "$d1_list" | DB_NAME="$DB_NAME" python -c "$(printf '%s\n' \
              'import os, re, sys' \
              'name=os.environ.get("DB_NAME", "")' \
              'text=sys.stdin.read()' \
              'uuid=re.compile(r"[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}")' \
              'for line in text.splitlines():' \
              '    if name and name in line:' \
              '        m=uuid.search(line)' \
              '        if m:' \
              '            print(m.group(0)); sys.exit(0)' \
              '        parts=line.split()' \
              '        if parts and parts[0]==name and len(parts)>=2:' \
              '            print(parts[1]); sys.exit(0)' \
              'm=uuid.search(text)' \
              'print(m.group(0) if m else "")' \
            )")
          fi

          if [ -z "$db_id" ]; then
            echo "Failed to resolve D1 database id" >&2
            exit 1
          fi

          r2_enabled="1"
          set +e
          r2_list="$(${WRANGLER[@]} r2 bucket list 2>&1)"
          r2_list_code=$?
          set -e
          if [ $r2_list_code -ne 0 ] || echo "$r2_list" | grep -qi "10042\|enable R2"; then
            r2_enabled="0"
          fi

          r2_exists=""
          if [ "$r2_enabled" = "1" ]; then
            r2_exists=$(printf '%s' "$r2_list" | R2_NAME="$R2_NAME" python -c "$(printf '%s\n' \
              'import os, sys' \
              'name=os.environ.get("R2_NAME", "")' \
              'text=sys.stdin.read()' \
              'for line in text.splitlines():' \
              '    if line.strip()==name:' \
              '        print("1"); sys.exit(0)' \
              '    parts=line.split()' \
              '    if parts and parts[0]==name:' \
              '        print("1"); sys.exit(0)' \
              'print("")' \
            )")
          fi

          if [ "$r2_enabled" = "1" ] && [ -z "$r2_exists" ]; then
            set +e
            r2_create_out="$(${WRANGLER[@]} r2 bucket create "$R2_NAME" 2>&1)"
            r2_create_code=$?
            set -e
            if [ $r2_create_code -ne 0 ]; then
              echo "$r2_create_out" >&2
              r2_enabled="0"
            fi
          fi

          DB_ID="$db_id" R2_NAME="$R2_NAME" R2_ENABLED="$r2_enabled" python -c "$(printf '%s\n' \
            'import os, re' \
            'from pathlib import Path' \
            'path = Path("wrangler.jsonc")' \
            'text = path.read_text(encoding="utf-8")' \
            'db_id = os.environ["DB_ID"]' \
            'r2_name = os.environ["R2_NAME"]' \
            'r2_enabled = os.environ.get("R2_ENABLED", "1") == "1"' \
            'm = re.search(r"(\"d1_databases\"\\s*:\\s*\\[[\\s\\S]*?\\])", text)' \
            'if not m:' \
            '    raise SystemExit("d1_databases block not found")' \
            'block = m.group(1)' \
            'obj_pat = r"\\{\\s*\"binding\"\\s*:\\s*\"DB\"[\\s\\S]*?\\}"' \
            'om = re.search(obj_pat, block)' \
            'if not om:' \
            '    raise SystemExit("DB binding not found in d1_databases")' \
            'obj = om.group(0)' \
            'if re.search(r"(\"database_id\"\\s*:\\s*\")[^\"]*(\")", obj):' \
            '    obj = re.sub(r"(\"database_id\"\\s*:\\s*\")[^\"]*(\")", r"\\1"+db_id+r"\\2", obj)' \
            'else:' \
            '    obj = re.sub(r"(\"database_name\"\\s*:\\s*\"[^\"]*\")", r"\\1,\\n      \"database_id\": \""+db_id+"\"", obj)' \
            'block = block[:om.start()] + obj + block[om.end():]' \
            'text = text[:m.start(1)] + block + text[m.end(1):]' \
            'r2_pat = r"(\"r2_buckets\"\\s*:\\s*\\[[\\s\\S]*?\\]\\s*,?)"' \
            'if not r2_enabled:' \
            '    text = re.sub(r2_pat, "", text, count=1)' \
            'else:' \
            '    r2_block = "\\n".join([' \
            '        "  \\\"r2_buckets\\\": [",' \
            '        "    {",' \
            '        "      \\\"binding\\\": \\\"R2_STORAGE\\\"," ,' \
            '        f"      \\\"bucket_name\\\": \\\"{r2_name}\\\"",' \
            '        "    }",' \
            '        "  ],",' \
            '    ])' \
            '    def update_r2_block(b):' \
            '        b = re.sub(r"(\"bucket_name\"\\s*:\\s*\")[^\"]*(\")", r"\\1"+r2_name+r"\\2", b)' \
            '        if not re.search(r"\"binding\"\\s*:", b):' \
            '            b = re.sub(r"\\{\\s*", "{\\n      \\\"binding\\\": \\\"R2_STORAGE\\\",\\n      ", b, count=1)' \
            '        return b' \
            '    if re.search(r2_pat, text):' \
            '        text = re.sub(r2_pat, lambda m: update_r2_block(m.group(0)), text, count=1)' \
            '    else:' \
            '        inserted = [False]' \
            '        kv_pat = r"(\"kv_namespaces\"\\s*:\\s*\\[[\\s\\S]*?\\]\\s*,)"' \
            '        def ins(m):' \
            '            inserted[0] = True' \
            '            return m.group(1) + "\\n\\n" + r2_block' \
            '        text = re.sub(kv_pat, ins, text, count=1)' \
            '        if not inserted[0]:' \
            '            text = re.sub(r"(\"vars\"\\s*:\\s*\\{)", r2_block + "\\n\\n  " + r"\\1", text, count=1)' \
            'path.write_text(text, encoding="utf-8")' \
          )"
        shell: bash

      - name: Ensure KV namespace
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAME: grok2api-cache
          KV_PREVIEW_NAME: grok2api-cache-preview
        run: |
          set -euo pipefail
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          AUTH_HEADER="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          get_or_create() {
            local NAME="$1"
            local EXISTING
            EXISTING=$(curl -sS -H "$AUTH_HEADER" "$API_BASE" | python -c "$(printf '%s\n' \
              'import json, sys' \
              'data=json.load(sys.stdin)' \
              'name=sys.argv[1]' \
              'for item in data.get("result", []):' \
              '    if item.get("title")==name:' \
              '        print(item.get("id"))' \
              '        raise SystemExit(0)' \
              'print("")' \
            )" "$NAME")
            if [ -n "$EXISTING" ]; then
              echo "$EXISTING"
              return 0
            fi
            CREATED=$(curl -sS -X POST -H "$AUTH_HEADER" -H "Content-Type: application/json" \
              --data "{\"title\":\"$NAME\"}" "$API_BASE" | python -c "$(printf '%s\n' \
                'import json, sys' \
                'data=json.load(sys.stdin)' \
                'print(data.get("result", {}).get("id", ""))' \
              )")
            echo "$CREATED"
          }

          KV_ID=$(get_or_create "$KV_NAME")
          KV_PREVIEW_ID=$(get_or_create "$KV_PREVIEW_NAME")

          if [ -z "$KV_ID" ] || [ -z "$KV_PREVIEW_ID" ]; then
            echo "Failed to create KV namespaces" >&2
            exit 1
          fi

          python -c "$(printf '%s\n' \
            'from pathlib import Path' \
            'import os' \
            'path = Path("wrangler.jsonc")' \
            'text = path.read_text(encoding="utf-8")' \
            'text = text.replace("KV_CACHE_ID", os.environ["KV_ID"]).replace("KV_CACHE_PREVIEW_ID", os.environ["KV_PREVIEW_ID"])' \
            'path.write_text(text, encoding="utf-8")' \
          )"
        shell: bash

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: uv run pywrangler deploy
