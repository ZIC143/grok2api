name: Deploy Cloudflare Workers

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ensure D1/R2 and inject bindings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DB_NAME: grok2api
          R2_NAME: grok2api-data
        run: |
          set -euo pipefail
          WRANGLER=(npx -y wrangler@latest)

          db_id=$(
            DB_NAME="$DB_NAME" ${WRANGLER[@]} d1 list --json | python -c "$(printf '%s\n' \
              'import json, sys, os' \
              'name=os.environ.get("DB_NAME")' \
              'data=json.load(sys.stdin)' \
              'def iter_items(d):' \
              '    if isinstance(d, dict) and "result" in d:' \
              '        d=d["result"]' \
              '    if isinstance(d, list):' \
              '        for i in d:' \
              '            if isinstance(i, dict):' \
              '                yield i' \
              '    elif isinstance(d, dict):' \
              '        yield d' \
              'def find_id(item):' \
              '    for k in ("database_id","uuid","id"):' \
              '        if item.get(k):' \
              '            return item[k]' \
              '    return None' \
              'for item in iter_items(data):' \
              '    if item.get("name")==name:' \
              '        v=find_id(item)' \
              '        if v:' \
              '            print(v)' \
              '            sys.exit(0)' \
              'print("")' \
            )"
          )

          if [ -z "$db_id" ]; then
            db_id=$(
              ${WRANGLER[@]} d1 create "$DB_NAME" --json | python -c "$(printf '%s\n' \
                'import json, sys' \
                'data=json.load(sys.stdin)' \
                'if isinstance(data, dict) and "result" in data:' \
                '    data=data["result"]' \
                'def find_id(d):' \
                '    if isinstance(d, dict):' \
                '        for k in ("database_id","uuid","id"):' \
                '            if d.get(k):' \
                '                return d[k]' \
                '    return None' \
                'v = find_id(data)' \
                'if not v and isinstance(data, dict) and "database" in data:' \
                '    v = find_id(data["database"])' \
                'print(v or "")' \
              )"
            )
          fi

          if [ -z "$db_id" ]; then
            echo "Failed to resolve D1 database id" >&2
            exit 1
          fi

          r2_exists=$(
            R2_NAME="$R2_NAME" ${WRANGLER[@]} r2 bucket list --json | python -c "$(printf '%s\n' \
              'import json, sys, os' \
              'name=os.environ.get("R2_NAME")' \
              'data=json.load(sys.stdin)' \
              'if isinstance(data, dict) and "result" in data:' \
              '    data=data["result"]' \
              'exists=False' \
              'if isinstance(data, list):' \
              '    for item in data:' \
              '        if isinstance(item, dict) and item.get("name")==name:' \
              '            exists=True' \
              '            break' \
              'print("1" if exists else "")' \
            )"
          )

          if [ -z "$r2_exists" ]; then
            ${WRANGLER[@]} r2 bucket create "$R2_NAME"
          fi

          DB_ID="$db_id" R2_NAME="$R2_NAME" python -c "$(printf '%s\n' \
            'import os, re' \
            'from pathlib import Path' \
            'path = Path("wrangler.jsonc")' \
            'text = path.read_text(encoding="utf-8")' \
            'db_id = os.environ["DB_ID"]' \
            'r2_name = os.environ["R2_NAME"]' \
            'm = re.search(r"(\"d1_databases\"\\s*:\\s*\\[[\\s\\S]*?\\])", text)' \
            'if not m:' \
            '    raise SystemExit("d1_databases block not found")' \
            'block = m.group(1)' \
            'obj_pat = r"\\{\\s*\"binding\"\\s*:\\s*\"DB\"[\\s\\S]*?\\}"' \
            'om = re.search(obj_pat, block)' \
            'if not om:' \
            '    raise SystemExit("DB binding not found in d1_databases")' \
            'obj = om.group(0)' \
            'if re.search(r"(\"database_id\"\\s*:\\s*\")[^\"]*(\")", obj):' \
            '    obj = re.sub(r"(\"database_id\"\\s*:\\s*\")[^\"]*(\")", r"\\1"+db_id+r"\\2", obj)' \
            'else:' \
            '    obj = re.sub(r"(\"database_name\"\\s*:\\s*\"[^\"]*\")", r"\\1,\\n      \"database_id\": \""+db_id+"\"", obj)' \
            'block = block[:om.start()] + obj + block[om.end():]' \
            'text = text[:m.start(1)] + block + text[m.end(1):]' \
            'r2_block = "\\n".join([' \
            '    "  \\\"r2_buckets\\\": [",' \
            '    "    {",' \
            '    "      \\\"binding\\\": \\\"R2_STORAGE\\\"," ,' \
            '    f"      \\\"bucket_name\\\": \\\"{r2_name}\\\"",' \
            '    "    }",' \
            '    "  ],",' \
            '])' \
            'def update_r2_block(b):' \
            '    b = re.sub(r"(\"bucket_name\"\\s*:\\s*\")[^\"]*(\")", r"\\1"+r2_name+r"\\2", b)' \
            '    if not re.search(r"\"binding\"\\s*:", b):' \
            '        b = re.sub(r"\\{\\s*", "{\\n      \\\"binding\\\": \\\"R2_STORAGE\\\",\\n      ", b, count=1)' \
            '    return b' \
            'r2_pat = r"(\"r2_buckets\"\\s*:\\s*\\[[\\s\\S]*?\\]\\s*,?)"' \
            'if re.search(r2_pat, text):' \
            '    text = re.sub(r2_pat, lambda m: update_r2_block(m.group(0)), text, count=1)' \
            'else:' \
            '    inserted = False' \
            '    kv_pat = r"(\"kv_namespaces\"\\s*:\\s*\\[[\\s\\S]*?\\]\\s*,)"' \
            '    def ins(m):' \
            '        nonlocal inserted' \
            '        inserted = True' \
            '        return m.group(1) + "\\n\\n" + r2_block' \
            '    text = re.sub(kv_pat, ins, text, count=1)' \
            '    if not inserted:' \
            '        text = re.sub(r"(\"vars\"\\s*:\\s*\\{)", r2_block + "\\n\\n  " + r"\\1", text, count=1)' \
            'path.write_text(text, encoding="utf-8")' \
          )"
        shell: bash

      - name: Ensure KV namespace
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAME: grok2api-cache
          KV_PREVIEW_NAME: grok2api-cache-preview
        run: |
          set -euo pipefail
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          AUTH_HEADER="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          get_or_create() {
            local NAME="$1"
            local EXISTING
            EXISTING=$(curl -sS -H "$AUTH_HEADER" "$API_BASE" | python -c "$(printf '%s\n' \
              'import json, sys' \
              'data=json.load(sys.stdin)' \
              'name=sys.argv[1]' \
              'for item in data.get("result", []):' \
              '    if item.get("title")==name:' \
              '        print(item.get("id"))' \
              '        raise SystemExit(0)' \
              'print("")' \
            )" "$NAME")
            if [ -n "$EXISTING" ]; then
              echo "$EXISTING"
              return 0
            fi
            CREATED=$(curl -sS -X POST -H "$AUTH_HEADER" -H "Content-Type: application/json" \
              --data "{\"title\":\"$NAME\"}" "$API_BASE" | python -c "$(printf '%s\n' \
                'import json, sys' \
                'data=json.load(sys.stdin)' \
                'print(data.get("result", {}).get("id", ""))' \
              )")
            echo "$CREATED"
          }

          KV_ID=$(get_or_create "$KV_NAME")
          KV_PREVIEW_ID=$(get_or_create "$KV_PREVIEW_NAME")

          if [ -z "$KV_ID" ] || [ -z "$KV_PREVIEW_ID" ]; then
            echo "Failed to create KV namespaces" >&2
            exit 1
          fi

          python -c "$(printf '%s\n' \
            'from pathlib import Path' \
            'import os' \
            'path = Path("wrangler.jsonc")' \
            'text = path.read_text(encoding="utf-8")' \
            'text = text.replace("KV_CACHE_ID", os.environ["KV_ID"]).replace("KV_CACHE_PREVIEW_ID", os.environ["KV_PREVIEW_ID"])' \
            'path.write_text(text, encoding="utf-8")' \
          )"
        shell: bash

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: uv run pywrangler deploy
